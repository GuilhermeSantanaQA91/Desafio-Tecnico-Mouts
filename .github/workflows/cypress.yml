name: Cypress Tests — CI

on:
  push:
    branches:
      - main
      - 'feat/**'
  pull_request:
    branches:
      - main

env:
  CYPRESS_CACHE_FOLDER: ~/.cache/Cypress

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  cypress-run-api:
    name: API Tests (@api)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Node.js e pnpm (via corepack)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Habilitar corepack e instalar pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.12.0 --activate

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Instalar binário do Cypress (cache)
        uses: actions/cache@v4
        id: cypress-cache
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Instalar Cypress se não estiver em cache
        if: steps.cypress-cache.outputs.cache-hit != 'true'
        run: pnpm exec cypress install

      - name: Executar testes de API
        run: pnpm run cy:run:api

  cypress-run-e2e:
    name: E2E Tests (@e2e)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Habilitar corepack e instalar pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.12.0 --activate

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Instalar binário do Cypress (cache)
        uses: actions/cache@v4
        id: cypress-cache
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Instalar Cypress se não estiver em cache
        if: steps.cypress-cache.outputs.cache-hit != 'true'
        run: pnpm exec cypress install

      - name: Executar testes E2E
        run: pnpm run cy:run:e2e

  publish-report:
    name: Publicar Relatório no GitHub Pages
    runs-on: ubuntu-24.04
    needs: [cypress-run-api, cypress-run-e2e]
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Habilitar corepack e instalar pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.12.0 --activate

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Instalar binário do Cypress (cache)
        uses: actions/cache@v4
        id: cypress-cache
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Instalar Cypress se não estiver em cache
        if: steps.cypress-cache.outputs.cache-hit != 'true'
        run: pnpm exec cypress install

      - name: Executar todos os testes e gerar relatório
        run: pnpm run cy:run:report
        continue-on-error: true

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Fazer upload do relatório para o Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: cypress/reports/mochawesome/

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
